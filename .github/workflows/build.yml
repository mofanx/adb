name: Build ADB for Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      aosp_tag:
        description: 'AOSP source tag (e.g. platform-tools-35.0.2)'
        required: false
        default: 'platform-tools-35.0.2'

env:
  NDK_VERSION: r27c
  AOSP_TAG: ${{ github.event.inputs.aosp_tag || 'platform-tools-35.0.2' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
        include:
          - abi: arm64-v8a
            arch_name: aarch64
          - abi: armeabi-v7a
            arch_name: arm
          - abi: x86_64
            arch_name: x86_64
          - abi: x86
            arch_name: i686

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3 git flex bison

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: android-ndk-${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip -q android-ndk-${NDK_VERSION}-linux.zip
          rm android-ndk-${NDK_VERSION}-linux.zip

      - name: Cache AOSP sources
        id: cache-src
        uses: actions/cache@v4
        with:
          path: src
          key: aosp-src-${{ env.AOSP_TAG }}-adb-v5

      - name: Fetch AOSP source code
        run: python3 get_source.py --tags ${{ env.AOSP_TAG }}

      - name: Install host protoc
        run: |
          # Use protoc 3.21.12 compatible with AOSP protobuf
          PROTOC_VERSION=21.12
          wget -q https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
          mkdir -p protoc-host
          unzip -q protoc-${PROTOC_VERSION}-linux-x86_64.zip -d protoc-host
          rm protoc-${PROTOC_VERSION}-linux-x86_64.zip
          chmod +x protoc-host/bin/protoc
          echo "PROTOC_PATH=$(pwd)/protoc-host/bin/protoc" >> $GITHUB_ENV
          $(pwd)/protoc-host/bin/protoc --version

      - name: Build ADB for ${{ matrix.abi }}
        run: |
          python3 build.py \
            --ndk=$(pwd)/android-ndk-${NDK_VERSION} \
            --abi=${{ matrix.abi }} \
            --build=build-${{ matrix.arch_name }} \
            --protoc=${PROTOC_PATH}

      - name: Verify binary
        run: |
          ls -la output/
          file output/adb-${{ matrix.arch_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adb-${{ matrix.arch_name }}
          path: output/adb-${{ matrix.arch_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/adb-*/; do
            cp "$dir"adb-* release/
          done
          ls -la release/
          cd release
          for f in adb-*; do
            chmod +x "$f"
            sha256sum "$f" >> checksums-sha256.txt
          done
          cat checksums-sha256.txt

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ADB Build ${{ steps.tag.outputs.tag }}"
          body: |
            ## ADB Binary Build

            Built from AOSP source tag: `${{ env.AOSP_TAG }}`

            ### Included architectures
            | File | Architecture | Android ABI |
            |------|-------------|-------------|
            | `adb-aarch64` | ARM 64-bit | arm64-v8a |
            | `adb-arm` | ARM 32-bit | armeabi-v7a |
            | `adb-x86_64` | x86 64-bit | x86_64 |
            | `adb-i686` | x86 32-bit | x86 |

            ### Integration into Android app
            Place the appropriate binary in your app's `assets` or `jniLibs` directory.
            At runtime, copy it to your app's private directory, set executable permission (`chmod 755`), and invoke it.

            ### Verify checksums
            See `checksums-sha256.txt` for SHA-256 hashes.
          files: |
            release/adb-*
            release/checksums-sha256.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
